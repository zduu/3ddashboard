name: build-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-package:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build standalone exe
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process
          ./package_windows.ps1 -OutputDir dist

      - name: Zip dist folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath dist/dashboard_runner.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-runner-windows
          path: dist/dashboard_runner.zip

  macos-package:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Make packaging script executable
        run: chmod +x ./package_macos.sh

      - name: Build macOS app
        run: ./package_macos.sh dist

      - name: Zip app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/dashboard_runner.app dist/dashboard_runner_macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-runner-macos
          path: dist/dashboard_runner_macos.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - windows-package
      - macos-package
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-runner-windows
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-runner-macos
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/dashboard_runner.zip
            dist/dashboard_runner_macos.zip
