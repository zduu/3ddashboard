name: build-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  windows-package:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build standalone exe
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process
          ./package_windows.ps1 -OutputDir dist

      - name: Zip dist folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath dist/dashboard_runner.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-runner
          path: dist/dashboard_runner.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/dashboard_runner.zip
